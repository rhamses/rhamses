name: Theme Package to R2

on:
  repository_dispatch:
    types: [theme_import_requested]
  workflow_dispatch:
    inputs:
      theme_post_id:
        description: "Theme post id (callback correlation)"
        required: true
      theme_slug:
        description: "Theme slug"
        required: true
      repo_url:
        description: "Public GitHub repository URL"
        required: true
      ref:
        description: "Git ref/branch/tag"
        required: false
        default: "main"
      subdir:
        description: "Optional subdirectory inside theme repository"
        required: false
        default: ""

jobs:
  package-theme:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v4

      - name: Resolve payload
        id: payload
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            THEME_POST_ID="${{ github.event.client_payload.theme_post_id }}"
            THEME_SLUG="${{ github.event.client_payload.theme_slug }}"
            REPO_URL="${{ github.event.client_payload.repo_url }}"
            THEME_REF="${{ github.event.client_payload.ref }}"
            THEME_SUBDIR="${{ github.event.client_payload.subdir }}"
          else
            THEME_POST_ID="${{ github.event.inputs.theme_post_id }}"
            THEME_SLUG="${{ github.event.inputs.theme_slug }}"
            REPO_URL="${{ github.event.inputs.repo_url }}"
            THEME_REF="${{ github.event.inputs.ref }}"
            THEME_SUBDIR="${{ github.event.inputs.subdir }}"
          fi

          THEME_REF="${THEME_REF:-main}"
          THEME_SUBDIR="${THEME_SUBDIR:-}"

          if [[ -z "${THEME_POST_ID}" || -z "${THEME_SLUG}" || -z "${REPO_URL}" ]]; then
            echo "Missing required payload fields."
            exit 1
          fi

          if [[ ! "${THEME_SLUG}" =~ ^[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
            echo "Invalid theme slug: ${THEME_SLUG}"
            exit 1
          fi

          if [[ "${THEME_SUBDIR}" == "." ]]; then
            THEME_SUBDIR=""
          fi
          THEME_SUBDIR="${THEME_SUBDIR#/}"
          THEME_SUBDIR="${THEME_SUBDIR%/}"
          if [[ -n "${THEME_SUBDIR}" ]]; then
            if [[ "${THEME_SUBDIR}" == *".."* || "${THEME_SUBDIR}" == *"\\"* ]]; then
              echo "Invalid theme subdir: ${THEME_SUBDIR}"
              exit 1
            fi
          fi

          if [[ ! "${REPO_URL}" =~ ^https://github\.com/[^/]+/[^/]+/?$ && ! "${REPO_URL}" =~ ^https://github\.com/[^/]+/[^/]+\.git$ ]]; then
            echo "Invalid public GitHub URL: ${REPO_URL}"
            exit 1
          fi

          REPO_NO_PROTO="${REPO_URL#https://github.com/}"
          REPO_NO_DOTGIT="${REPO_NO_PROTO%.git}"
          REPO_FULL_NAME="${REPO_NO_DOTGIT%/}"

          echo "theme_post_id=${THEME_POST_ID}" >> "$GITHUB_OUTPUT"
          echo "theme_slug=${THEME_SLUG}" >> "$GITHUB_OUTPUT"
          echo "repo_url=${REPO_URL}" >> "$GITHUB_OUTPUT"
          echo "repo_full_name=${REPO_FULL_NAME}" >> "$GITHUB_OUTPUT"
          echo "theme_ref=${THEME_REF}" >> "$GITHUB_OUTPUT"
          echo "theme_subdir=${THEME_SUBDIR}" >> "$GITHUB_OUTPUT"

      - name: Checkout theme repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.payload.outputs.repo_full_name }}
          ref: ${{ steps.payload.outputs.theme_ref }}
          path: __theme_src

      - name: Read theme commit sha
        id: theme_sha
        shell: bash
        run: |
          set -euo pipefail
          SHA="$(git -C __theme_src rev-parse HEAD)"
          SHORT_SHA="${SHA:0:12}"
          REF_SLUG="$(echo '${{ steps.payload.outputs.theme_ref }}' | tr '/ ' '--' | tr -cd 'A-Za-z0-9._-')"
          VERSION="${REF_SLUG}-${SHORT_SHA}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Prepare theme package
        id: package
        shell: bash
        run: |
          set -euo pipefail

          THEME_SLUG="${{ steps.payload.outputs.theme_slug }}"
          THEME_SUBDIR="${{ steps.payload.outputs.theme_subdir }}"
          THEME_VERSION="${{ steps.theme_sha.outputs.version }}"
          THEME_SHA="${{ steps.theme_sha.outputs.sha }}"

          SRC_DIR="__theme_src"
          if [[ -n "${THEME_SUBDIR}" ]]; then
            SRC_DIR="__theme_src/${THEME_SUBDIR}"
          fi
          if [[ ! -d "${SRC_DIR}" ]]; then
            echo "Theme source directory not found: ${SRC_DIR}"
            exit 1
          fi

          BUILD_DIR="${SRC_DIR}/dist"
          if [[ ! -d "${BUILD_DIR}" ]]; then
            echo "Theme build directory not found: ${BUILD_DIR}"
            echo "Ensure the theme repository has a built 'dist' folder before importing."
            exit 1
          fi

          ASTRO_COUNT="$(find "${BUILD_DIR}" -type f -name '*.astro' | wc -l | tr -d ' ')"
          if [[ "${ASTRO_COUNT}" -eq 0 ]]; then
            echo "No .astro files found in theme build (dist)"
            exit 1
          fi

          PKG_DIR="${GITHUB_WORKSPACE}/__theme_pkg"
          mkdir -p "${PKG_DIR}"
          ZIP_PATH="${PKG_DIR}/theme.zip"
          rm -f "${ZIP_PATH}"
          # Use absolute output path to avoid fragile relative traversals.
          # Exclude git metadata to keep packages small and deterministic.
          (cd "${BUILD_DIR}" && zip -r "${ZIP_PATH}" . -x ".git/*" ".git/**")

          CHECKSUM="$(sha256sum "${ZIP_PATH}" | awk '{print $1}')"
          MANIFEST_PATH="${PKG_DIR}/manifest.json"
          cat > "${MANIFEST_PATH}" <<EOF
          {
            "theme_slug": "${THEME_SLUG}",
            "version": "${THEME_VERSION}",
            "commit_sha": "${THEME_SHA}",
            "repo_url": "${{ steps.payload.outputs.repo_url }}",
            "ref": "${{ steps.payload.outputs.theme_ref }}",
            "subdir": "${THEME_SUBDIR}",
            "zip_file": "theme.zip",
            "checksum_sha256": "${CHECKSUM}"
          }
          EOF

          R2_THEME_ZIP_KEY="themes/${THEME_SLUG}/${THEME_VERSION}/theme.zip"
          R2_MANIFEST_KEY="themes/${THEME_SLUG}/${THEME_VERSION}/manifest.json"
          R2_LATEST_KEY="themes/${THEME_SLUG}/latest.json"

          LATEST_PATH="${PKG_DIR}/latest.json"
          cat > "${LATEST_PATH}" <<EOF
          {
            "theme_slug": "${THEME_SLUG}",
            "version": "${THEME_VERSION}",
            "r2_key": "${R2_THEME_ZIP_KEY}",
            "manifest_key": "${R2_MANIFEST_KEY}",
            "checksum_sha256": "${CHECKSUM}",
            "commit_sha": "${THEME_SHA}"
          }
          EOF

          echo "checksum=${CHECKSUM}" >> "$GITHUB_OUTPUT"
          echo "zip_path=${ZIP_PATH}" >> "$GITHUB_OUTPUT"
          echo "manifest_path=${MANIFEST_PATH}" >> "$GITHUB_OUTPUT"
          echo "latest_path=${LATEST_PATH}" >> "$GITHUB_OUTPUT"
          echo "r2_theme_zip_key=${R2_THEME_ZIP_KEY}" >> "$GITHUB_OUTPUT"
          echo "r2_manifest_key=${R2_MANIFEST_KEY}" >> "$GITHUB_OUTPUT"
          echo "r2_latest_key=${R2_LATEST_KEY}" >> "$GITHUB_OUTPUT"

      - name: Set AWS env for R2
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.R2_ACCESS_KEY_ID }}" || -z "${{ secrets.R2_SECRET_ACCESS_KEY }}" ]]; then
            echo "Missing R2_ACCESS_KEY_ID or R2_SECRET_ACCESS_KEY secret"
            exit 1
          fi
          {
            echo "AWS_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}"
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}"
            echo "AWS_REGION=us-east-1"
            echo "AWS_DEFAULT_REGION=us-east-1"
          } >> "$GITHUB_ENV"

      - name: Upload theme package to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          if [[ -z "${R2_ACCOUNT_ID}" || -z "${R2_BUCKET}" ]]; then
            echo "Missing R2_ACCOUNT_ID or R2_BUCKET secret"
            exit 1
          fi
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 cp "${{ steps.package.outputs.zip_path }}" "s3://${R2_BUCKET}/${{ steps.package.outputs.r2_theme_zip_key }}" --endpoint-url "${ENDPOINT}"
          aws s3 cp "${{ steps.package.outputs.manifest_path }}" "s3://${R2_BUCKET}/${{ steps.package.outputs.r2_manifest_key }}" --endpoint-url "${ENDPOINT}"
          aws s3 cp "${{ steps.package.outputs.latest_path }}" "s3://${R2_BUCKET}/${{ steps.package.outputs.r2_latest_key }}" --endpoint-url "${ENDPOINT}"

      - name: Callback success
        if: success()
        env:
          CALLBACK_URL: ${{ secrets.THEME_IMPORT_CALLBACK_URL }}
          CALLBACK_SECRET: ${{ secrets.THEME_IMPORT_CALLBACK_SECRET }}
        run: |
          set -euo pipefail
          if [[ -z "${CALLBACK_URL}" || -z "${CALLBACK_SECRET}" ]]; then
            echo "Callback success skipped: missing callback secrets."
            exit 0
          fi
          BODY="$(jq -n \
            --arg theme_post_id "${{ steps.payload.outputs.theme_post_id }}" \
            --arg theme_slug "${{ steps.payload.outputs.theme_slug }}" \
            --arg commit_sha "${{ steps.theme_sha.outputs.sha }}" \
            --arg message "Theme packaged and uploaded to R2" \
            --arg r2_key "${{ steps.package.outputs.r2_theme_zip_key }}" \
            --arg manifest_key "${{ steps.package.outputs.r2_manifest_key }}" \
            --arg version "${{ steps.theme_sha.outputs.version }}" \
            --arg checksum "${{ steps.package.outputs.checksum }}" \
            '{theme_post_id:$theme_post_id, theme_slug:$theme_slug, status:"success", success:true, commit_sha:$commit_sha, message:$message, r2_key:$r2_key, manifest_key:$manifest_key, version:$version, checksum:$checksum}' \
          )"
          curl -fsS -X POST "${CALLBACK_URL}" \
            -H "Content-Type: application/json" \
            -H "x-theme-import-secret: ${CALLBACK_SECRET}" \
            -d "${BODY}"

      - name: Callback failure
        if: failure()
        env:
          CALLBACK_URL: ${{ secrets.THEME_IMPORT_CALLBACK_URL }}
          CALLBACK_SECRET: ${{ secrets.THEME_IMPORT_CALLBACK_SECRET }}
        run: |
          set -euo pipefail
          if [[ -z "${CALLBACK_URL}" || -z "${CALLBACK_SECRET}" ]]; then
            echo "Callback failure skipped: missing callback secrets."
            exit 0
          fi
          BODY="$(jq -n \
            --arg theme_post_id "${{ steps.payload.outputs.theme_post_id }}" \
            --arg theme_slug "${{ steps.payload.outputs.theme_slug }}" \
            --arg commit_sha "${{ steps.theme_sha.outputs.sha }}" \
            --arg message "Theme package upload failed" \
            '{theme_post_id:$theme_post_id, theme_slug:$theme_slug, status:"failed", success:false, commit_sha:$commit_sha, message:$message}' \
          )"
          curl -sS -X POST "${CALLBACK_URL}" \
            -H "Content-Type: application/json" \
            -H "x-theme-import-secret: ${CALLBACK_SECRET}" \
            -d "${BODY}" || true
