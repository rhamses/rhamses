name = "edgepress-farra"
pages_build_output_dir = "./dist/server"
compatibility_date = "2024-09-23"
compatibility_flags = [ "nodejs_compat" ]

[env.production.vars]
BETTER_AUTH_URL = "https://edgepress-farra.rhamses.workers.dev"
BETTER_AUTH_TRUSTED_ORIGINS = "https://edgepress-farra.rhamses.workers.dev,https://feature-theme-support-edgepress-farra.rhamses.workers.dev"
RATE_LIMIT_LOGIN_MAX = "10"
RATE_LIMIT_LOGIN_WINDOW_MIN = "5"
RATE_LIMIT_REGISTER_MAX = "10"
RATE_LIMIT_REGISTER_WINDOW_MIN = "10"
RATE_LIMIT_UPLOAD_MAX = "100"
RATE_LIMIT_UPLOAD_WINDOW_MIN = "10"
RESEND_FROM = "contato@amb1.io"
# Opcional se o teu código ler estes nomes (senão remove):
# CLOUDFLARE_ACCOUNT_ID / CLOUDFLARE_DATABASE_ID — preferir só bindings D1 no Worker.
# Preview: NÃO coloques tokens ou passwords aqui (vão parar ao Git).
# Definir em Cloudflare → Pages → Settings → Environment variables (Preview) e/ou Secrets,
# ou em .dev.vars local (já está no .gitignore).
[env.preview.vars]
BETTER_AUTH_URL = "https://feature-theme-support-edgepress-farra.rhamses.workers.dev"
BETTER_AUTH_TRUSTED_ORIGINS = "https://feature-theme-support-edgepress-farra.rhamses.workers.dev"
RATE_LIMIT_LOGIN_MAX = "10"
RATE_LIMIT_LOGIN_WINDOW_MIN = "5"
RATE_LIMIT_REGISTER_MAX = "10"
RATE_LIMIT_REGISTER_WINDOW_MIN = "10"
RATE_LIMIT_UPLOAD_MAX = "100"
RATE_LIMIT_UPLOAD_WINDOW_MIN = "10"
RESEND_FROM = "contato@amb1.io"
# Opcional se o teu código ler estes nomes (senão remove):
# CLOUDFLARE_ACCOUNT_ID / CLOUDFLARE_DATABASE_ID — preferir só bindings D1 no Worker.

[[d1_databases]]
binding = "DB"
database_name = "edgepress"
database_id = "adf7f002-517e-4e53-8a3f-c870226ad418"
preview_database_id = "fbe4ede5-a168-4a33-8570-4c62be8b1c94"
migrations_dir = "./drizzle"

[[kv_namespaces]]
binding = "edgepress_cache"
id = "eb122e65276746228228af8b69d244fa"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "edgepress-media"

[[env.preview.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "edgepress-media-preview"

[observability]
[observability.logs]
enabled = false
invocation_logs = true
